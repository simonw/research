<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Turbolite WASM - HTTP Range Request SQLite</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
h1 { color: #00d4ff; margin-bottom: 10px; }
h2 { color: #7b68ee; margin: 15px 0 8px; font-size: 1.1em; }
.controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin: 10px 0; }
select, button, input { padding: 6px 12px; border-radius: 4px; border: 1px solid #444; background: #2a2a4e; color: #e0e0e0; font-size: 14px; }
button { cursor: pointer; background: #3a3a6e; }
button:hover { background: #4a4a8e; }
button:disabled { opacity: 0.5; cursor: not-allowed; }
#query-input { width: 100%; font-family: monospace; font-size: 14px; padding: 8px; min-height: 60px; }
#status { padding: 8px; background: #2a2a4e; border-radius: 4px; margin: 10px 0; min-height: 30px; }
#results { margin-top: 10px; }
table { border-collapse: collapse; width: 100%; margin-top: 5px; }
th, td { border: 1px solid #444; padding: 4px 8px; text-align: left; font-size: 13px; }
th { background: #2a2a4e; }
tr:nth-child(even) { background: #1e1e3e; }
.metric { display: inline-block; background: #2a2a4e; padding: 4px 10px; border-radius: 4px; margin: 2px; font-size: 13px; }
.metric b { color: #00d4ff; }
#benchmark-output { white-space: pre-wrap; font-family: monospace; font-size: 13px; background: #111; padding: 10px; border-radius: 4px; margin-top: 10px; max-height: 500px; overflow-y: auto; }
.tabs { display: flex; gap: 2px; margin: 10px 0; }
.tab { padding: 6px 16px; cursor: pointer; background: #2a2a4e; border-radius: 4px 4px 0 0; }
.tab.active { background: #3a3a6e; color: #00d4ff; }
.tab-content { display: none; }
.tab-content.active { display: block; }
</style>

<body>

<h1>Turbolite WASM Explorer</h1>
<p>Read-only SQLite querying via HTTP range requests in the browser</p>

<div class="tabs">
  <div class="tab active" data-tab="query">Query</div>
  <div class="tab" data-tab="benchmark">Benchmark</div>
</div>

<div id="tab-query" class="tab-content active">
  <h2>Database</h2>
  <div class="controls">
    <label>Format:
      <select id="format-select">
        <option value="sqlite">Plain SQLite</option>
        <option value="turbolite">Turbolite (compressed)</option>
      </select>
    </label>
    <label>Size:
      <select id="size-select">
        <option value="tiny">Tiny (100 rows)</option>
        <option value="small">Small (1K rows)</option>
        <option value="medium" selected>Medium (10K rows)</option>
        <option value="large">Large (100K rows)</option>
        <option value="xlarge">XLarge (500K rows)</option>
      </select>
    </label>
    <label>Mode:
      <select id="mode-select">
        <option value="range">HTTP Range Requests</option>
        <option value="full">Full Download</option>
      </select>
    </label>
    <label>Decompressor:
      <select id="decompressor-select">
        <option value="fzstd">fzstd (pure JS)</option>
        <option value="wasm" selected>zstd-wasm (WASM)</option>
      </select>
    </label>
    <button id="btn-open" onclick="openDatabase()">Open Database</button>
  </div>

  <div id="status">Ready. Select a database and click Open.</div>

  <h2>Query</h2>
  <textarea id="query-input">SELECT name, city, score FROM users WHERE city = 'Tokyo' AND age > 30 LIMIT 20</textarea>
  <div class="controls" style="margin-top: 5px;">
    <button id="btn-run" onclick="runQuery()" disabled>Run Query</button>
    <select id="preset-queries" onchange="loadPreset()">
      <option value="">-- Preset Queries --</option>
      <option value="point">Point lookup by ID</option>
      <option value="filter">Filter by city + age</option>
      <option value="agg">Aggregation (GROUP BY)</option>
      <option value="join">Join (users + orders)</option>
      <option value="complex">Complex join + agg</option>
      <option value="scan">Full table scan</option>
      <option value="count">Count all rows</option>
    </select>
  </div>

  <div id="metrics"></div>
  <div id="results"></div>
</div>

<div id="tab-benchmark" class="tab-content">
  <h2>Automated Benchmark</h2>
  <p>Runs all preset queries against all database sizes and modes.</p>
  <div class="controls">
    <label>Format:
      <select id="bench-format">
        <option value="sqlite">Plain SQLite</option>
        <option value="turbolite">Turbolite (compressed)</option>
        <option value="both">Both (compare)</option>
      </select>
    </label>
    <label>Sizes:
      <select id="bench-sizes">
        <option value="all">All sizes</option>
        <option value="small-medium">Small + Medium</option>
        <option value="medium-only">Medium only</option>
      </select>
    </label>
    <button id="btn-bench" onclick="runBenchmark()">Run Benchmark</button>
    <button onclick="exportBenchmark()">Export JSON</button>
  </div>
  <div id="benchmark-output"></div>
</div>

<script src="sql-wasm.js"></script>
<script src="fzstd-browser.js"></script>
<script type="module">
  // Import WASM zstd decoder and expose it globally
  import { createDecoder, decompressSync } from './zstd-wasm-decoder.js';

  let wasmReady = false;
  let wasmDecoder = null;

  async function initWasmZstd() {
    if (wasmReady) return;
    try {
      wasmDecoder = await createDecoder();
      wasmReady = true;
      console.log('WASM zstd decoder initialized');
    } catch (e) {
      console.error('Failed to init WASM zstd:', e);
      throw e;
    }
  }

  function decompressWithWasm(data) {
    if (!wasmReady || !wasmDecoder) throw new Error('WASM zstd not initialized');
    return wasmDecoder.decompressSync(data);
  }

  // Expose globally
  window.initWasmZstd = initWasmZstd;
  window.decompressWithWasm = decompressWithWasm;
  window.wasmZstdReady = () => wasmReady;
</script>
<script>
// === Tab switching ===
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

const PRESETS = {
  point: "SELECT * FROM users WHERE id = 42",
  filter: "SELECT name, city, score FROM users WHERE city = 'Tokyo' AND age > 30 LIMIT 20",
  agg: "SELECT city, COUNT(*) as cnt, AVG(score) as avg_score FROM users GROUP BY city ORDER BY cnt DESC",
  join: "SELECT u.name, p.name as product, o.quantity, o.total FROM orders o JOIN users u ON o.user_id = u.id JOIN products p ON o.product_id = p.id WHERE u.city = 'London' LIMIT 20",
  complex: "SELECT u.city, COUNT(DISTINCT o.id) as order_count, SUM(o.total) as revenue, AVG(o.total) as avg_order FROM orders o JOIN users u ON o.user_id = u.id GROUP BY u.city ORDER BY revenue DESC",
  scan: "SELECT * FROM users ORDER BY score DESC LIMIT 50",
  count: "SELECT (SELECT COUNT(*) FROM users) as users, (SELECT COUNT(*) FROM products) as products, (SELECT COUNT(*) FROM orders) as orders",
};

function loadPreset() {
  const key = document.getElementById('preset-queries').value;
  if (key && PRESETS[key]) {
    document.getElementById('query-input').value = PRESETS[key];
  }
}

// === Global state ===
let SQL = null;
let db = null;
let dbStats = {};
let benchmarkResults = [];
let activeDecompressor = 'fzstd'; // 'fzstd' or 'wasm'

// === Decompression abstraction ===
function zstdDecompress(data) {
  if (activeDecompressor === 'wasm' && window.wasmZstdReady && window.wasmZstdReady()) {
    return window.decompressWithWasm(data);
  }
  return fzstd.decompress(data);
}

async function ensureDecompressor() {
  const selected = document.getElementById('decompressor-select').value;
  activeDecompressor = selected;
  if (selected === 'wasm' && window.initWasmZstd) {
    await window.initWasmZstd();
  }
}

// === sql.js initialization ===
async function loadSqlJs() {
  if (SQL) return SQL;
  SQL = await initSqlJs({ locateFile: f => f });
  return SQL;
}

// === HTTP Range Request VFS for plain SQLite ===
class HttpRangeVFS {
  constructor(url, indexData) {
    this.url = url;
    this.pageSize = indexData.pageSize;
    this.pageCount = indexData.pageCount;
    this.fileSize = indexData.fileSize;
    this.cache = new Map();
    this.fetchCount = 0;
    this.bytesTransferred = 0;
  }

  async fetchRange(start, end) {
    this.fetchCount++;
    const resp = await fetch(this.url, {
      headers: { 'Range': `bytes=${start}-${end - 1}` }
    });
    if (!resp.ok && resp.status !== 206) {
      throw new Error(`HTTP ${resp.status} fetching range ${start}-${end}`);
    }
    const buf = await resp.arrayBuffer();
    this.bytesTransferred += buf.byteLength;
    return new Uint8Array(buf);
  }

  async fetchPage(pageNum) {
    if (this.cache.has(pageNum)) return this.cache.get(pageNum);
    // SQLite pages are 1-indexed, stored at offset (pageNum-1)*pageSize
    const offset = (pageNum - 1) * this.pageSize;
    const data = await this.fetchRange(offset, offset + this.pageSize);
    this.cache.set(pageNum, data);
    return data;
  }

  // Prefetch multiple pages in a single request when possible
  async prefetchPages(startPage, count) {
    const start = (startPage - 1) * this.pageSize;
    const end = Math.min(start + count * this.pageSize, this.fileSize);
    const data = await this.fetchRange(start, end);
    for (let i = 0; i < count && (startPage + i) <= this.pageCount; i++) {
      const pageData = data.slice(i * this.pageSize, (i + 1) * this.pageSize);
      this.cache.set(startPage + i, pageData);
    }
  }

  async readFull() {
    const resp = await fetch(this.url);
    const buf = await resp.arrayBuffer();
    this.bytesTransferred += buf.byteLength;
    this.fetchCount++;
    return new Uint8Array(buf);
  }

  resetStats() {
    this.fetchCount = 0;
    this.bytesTransferred = 0;
  }
}

// === Turbolite VFS (compressed format with HTTP range requests) ===
class TurboliteRangeVFS {
  constructor(url, indexData) {
    this.url = url;
    this.pageSize = indexData.pageSize;
    this.pageCount = indexData.pageCount;
    this.fileSize = indexData.fileSize;
    this.pages = indexData.pages; // {pageNum: [offset, compressedSize]}
    this.dictOffset = indexData.dictOffset;
    this.dictSize = indexData.dictSize;
    this.cache = new Map();
    this.dict = null;
    this.fetchCount = 0;
    this.bytesTransferred = 0;
  }

  async init() {
    if (this.dictSize > 0 && this.dictOffset != null) {
      const resp = await fetch(this.url, {
        headers: { 'Range': `bytes=${this.dictOffset}-${this.dictOffset + this.dictSize - 1}` }
      });
      this.dict = new Uint8Array(await resp.arrayBuffer());
      this.fetchCount++;
      this.bytesTransferred += this.dict.length;
    }
  }

  async fetchRange(start, end) {
    this.fetchCount++;
    const resp = await fetch(this.url, {
      headers: { 'Range': `bytes=${start}-${end - 1}` }
    });
    if (!resp.ok && resp.status !== 206) {
      throw new Error(`HTTP ${resp.status} fetching range ${start}-${end}`);
    }
    const buf = await resp.arrayBuffer();
    this.bytesTransferred += buf.byteLength;
    return new Uint8Array(buf);
  }

  // Note: turbolite uses 0-indexed pages. Callers should use 0-based indexing.
  async fetchPage(pageNum) {
    if (this.cache.has(pageNum)) return this.cache.get(pageNum);

    const entry = this.pages[String(pageNum)];
    if (!entry) {
      const zeros = new Uint8Array(this.pageSize);
      this.cache.set(pageNum, zeros);
      return zeros;
    }

    const [offset, compressedSize] = entry;
    const compressed = await this.fetchRange(offset, offset + compressedSize);

    let decompressed;
    try {
      decompressed = zstdDecompress(compressed);
    } catch (e) {
      console.error(`Decompression failed for page ${pageNum}:`, e);
      throw e;
    }

    if (decompressed.length < this.pageSize) {
      const padded = new Uint8Array(this.pageSize);
      padded.set(decompressed);
      decompressed = padded;
    }

    this.cache.set(pageNum, decompressed);
    return decompressed;
  }

  async prefetchPages(startPage, count) {
    // For turbolite, batch adjacent pages into one range request
    const entries = [];
    for (let p = startPage; p < startPage + count; p++) {
      const entry = this.pages[String(p)];
      if (entry && !this.cache.has(p)) entries.push([p, entry]);
    }
    if (entries.length === 0) return;

    // Find contiguous range
    const minOffset = Math.min(...entries.map(e => e[1][0]));
    const maxEnd = Math.max(...entries.map(e => e[1][0] + e[1][1]));

    const data = await this.fetchRange(minOffset, maxEnd);
    for (const [pageNum, [offset, size]] of entries) {
      const localOffset = offset - minOffset;
      const compressed = data.slice(localOffset, localOffset + size);
      try {
        let decompressed = zstdDecompress(compressed);
        if (decompressed.length < this.pageSize) {
          const padded = new Uint8Array(this.pageSize);
          padded.set(decompressed);
          decompressed = padded;
        }
        this.cache.set(pageNum, decompressed);
      } catch (e) {
        console.warn(`Prefetch decompress failed for page ${pageNum}:`, e);
      }
    }
  }

  async readFull() {
    const resp = await fetch(this.url);
    const allData = new Uint8Array(await resp.arrayBuffer());
    this.bytesTransferred += allData.length;
    this.fetchCount++;

    // Reassemble full SQLite database from compressed pages
    // Turbolite uses 0-indexed pages (page 0 = SQLite header page)
    const fullDb = new Uint8Array((this.pageCount + 1) * this.pageSize);
    for (const [pageNumStr, [offset, size]] of Object.entries(this.pages)) {
      const pageNum = parseInt(pageNumStr);
      const compressed = allData.slice(offset, offset + size);
      try {
        let decompressed = zstdDecompress(compressed);
        const destOffset = pageNum * this.pageSize;
        fullDb.set(decompressed.subarray(0, this.pageSize), destOffset);
      } catch (e) {
        console.warn(`Decompress failed for page ${pageNum}:`, e);
      }
    }
    return fullDb;
  }

  resetStats() {
    this.fetchCount = 0;
    this.bytesTransferred = 0;
  }
}

// === Assemble a full DB buffer from VFS (range mode) ===
// sql.js doesn't support custom async VFS directly, so we use a two-phase approach:
// Phase 1 (range mode): fetch only the pages the query needs
// Phase 2: assemble into a buffer and open with sql.js
// For true lazy loading, we prefetch btree root pages + index pages first,
// then do the query.

async function openWithRangeRequests(vfs) {
  // SQLite page 1 always contains the header + sqlite_master
  // We need to read it to get schema info
  await vfs.prefetchPages(1, Math.min(16, vfs.pageCount)); // prefetch first 16 pages (schema + indexes)

  // Build full buffer from cached pages + fetch on demand
  const buf = new Uint8Array(vfs.pageCount * vfs.pageSize);
  for (let p = 1; p <= vfs.pageCount; p++) {
    const page = await vfs.fetchPage(p);
    buf.set(page, (p - 1) * vfs.pageSize);
  }
  return buf;
}

// === Smarter approach: two-phase query ===
// 1. Open DB with just the first few pages to parse schema
// 2. Run EXPLAIN to find which tables/indexes are needed
// 3. Prefetch those page ranges
// 4. Open full DB and run actual query
// This is the true "lazy" approach

async function lazyOpen(vfs, isTurbolite) {
  if (isTurbolite) {
    // Turbolite: 0-indexed pages, fetch all and assemble
    const batchSize = 64;
    const totalPages = vfs.pageCount + 1; // 0..pageCount inclusive
    for (let start = 0; start <= vfs.pageCount; start += batchSize) {
      const count = Math.min(batchSize, vfs.pageCount - start + 1);
      await vfs.prefetchPages(start, count);
    }
    const buf = new Uint8Array(totalPages * vfs.pageSize);
    for (let p = 0; p <= vfs.pageCount; p++) {
      const page = await vfs.fetchPage(p);
      buf.set(page, p * vfs.pageSize);
    }
    return buf;
  } else {
    // Plain SQLite: 1-indexed, pages at (p-1)*pageSize
    const page1 = await vfs.fetchPage(1);
    const view = new DataView(page1.buffer, page1.byteOffset);
    const actualPageCount = view.getUint32(28);

    const batchSize = 64;
    const totalPages = Math.min(actualPageCount, vfs.pageCount);

    for (let start = 1; start <= totalPages; start += batchSize) {
      const count = Math.min(batchSize, totalPages - start + 1);
      await vfs.prefetchPages(start, count);
    }

    const buf = new Uint8Array(totalPages * vfs.pageSize);
    for (let p = 1; p <= totalPages; p++) {
      const page = await vfs.fetchPage(p);
      buf.set(page, (p - 1) * vfs.pageSize);
    }
    return buf;
  }
}

// === Main UI functions ===

async function openDatabase() {
  const format = document.getElementById('format-select').value;
  const size = document.getElementById('size-select').value;
  const mode = document.getElementById('mode-select').value;
  const statusEl = document.getElementById('status');

  statusEl.textContent = `Opening ${size} ${format} database (${mode} mode)...`;

  try {
    await loadSqlJs();
    await ensureDecompressor();
    const t0 = performance.now();

    let dbBuf;
    let vfs;

    if (format === 'turbolite') {
      const indexResp = await fetch(`dbs/${size}.turbolite.index.json`);
      const indexData = await indexResp.json();
      vfs = new TurboliteRangeVFS(`dbs/${size}.turbolite`, indexData);
      await vfs.init();

      if (mode === 'full') {
        dbBuf = await vfs.readFull();
      } else {
        dbBuf = await lazyOpen(vfs, true);
      }
    } else {
      const indexResp = await fetch(`dbs/${size}.db.index.json`);
      const indexData = await indexResp.json();
      vfs = new HttpRangeVFS(`dbs/${size}.db`, indexData);

      if (mode === 'full') {
        dbBuf = await vfs.readFull();
      } else {
        dbBuf = await lazyOpen(vfs, false);
      }
    }

    const tOpen = performance.now();
    db = new SQL.Database(dbBuf);
    const tReady = performance.now();

    dbStats = {
      format,
      size,
      mode,
      decompressor: activeDecompressor,
      openTimeMs: Math.round(tReady - t0),
      fetchTimeMs: Math.round(tOpen - t0),
      parseTimeMs: Math.round(tReady - tOpen),
      requests: vfs.fetchCount,
      bytesTransferred: vfs.bytesTransferred,
    };

    const decompLabel = format === 'turbolite' ? `, decomp: ${activeDecompressor}` : '';
    statusEl.textContent = `Opened ${size} ${format} DB in ${dbStats.openTimeMs}ms ` +
      `(${vfs.fetchCount} requests, ${(vfs.bytesTransferred / 1024).toFixed(0)} KB transferred${decompLabel})`;
    document.getElementById('btn-run').disabled = false;

  } catch (e) {
    statusEl.textContent = `Error: ${e.message}`;
    console.error(e);
  }
}

function runQuery() {
  const sql = document.getElementById('query-input').value.trim();
  if (!sql || !db) return;

  const statusEl = document.getElementById('status');
  const metricsEl = document.getElementById('metrics');
  const resultsEl = document.getElementById('results');

  try {
    const t0 = performance.now();
    const results = db.exec(sql);
    const tQuery = performance.now();

    const queryTimeMs = (tQuery - t0).toFixed(2);
    const rowCount = results.length > 0 ? results[0].values.length : 0;

    metricsEl.innerHTML = [
      `<span class="metric">Query: <b>${queryTimeMs}ms</b></span>`,
      `<span class="metric">Rows: <b>${rowCount}</b></span>`,
      `<span class="metric">Open: <b>${dbStats.openTimeMs}ms</b></span>`,
      `<span class="metric">Requests: <b>${dbStats.requests}</b></span>`,
      `<span class="metric">Transferred: <b>${(dbStats.bytesTransferred / 1024).toFixed(0)} KB</b></span>`,
    ].join('');

    if (results.length > 0) {
      const { columns, values } = results[0];
      let html = '<table><tr>' + columns.map(c => `<th>${c}</th>`).join('') + '</tr>';
      for (const row of values.slice(0, 100)) {
        html += '<tr>' + row.map(v => `<td>${v ?? 'NULL'}</td>`).join('') + '</tr>';
      }
      html += '</table>';
      if (values.length > 100) html += `<p>Showing 100 of ${values.length} rows</p>`;
      resultsEl.innerHTML = html;
    } else {
      resultsEl.innerHTML = '<p>No results returned.</p>';
    }

    statusEl.textContent = `Query completed in ${queryTimeMs}ms (${rowCount} rows)`;

    // Store for benchmark export
    window.lastQueryResult = {
      sql,
      queryTimeMs: parseFloat(queryTimeMs),
      rowCount,
      ...dbStats,
    };

  } catch (e) {
    statusEl.textContent = `Query error: ${e.message}`;
    resultsEl.innerHTML = `<pre style="color: #ff6b6b;">${e.message}</pre>`;
  }
}

// === Benchmark runner ===

async function runBenchmark() {
  const output = document.getElementById('benchmark-output');
  const benchFormat = document.getElementById('bench-format').value;
  const benchSizes = document.getElementById('bench-sizes').value;

  const formats = benchFormat === 'both' ? ['sqlite', 'turbolite'] : [benchFormat];
  let sizes;
  switch (benchSizes) {
    case 'small-medium': sizes = ['small', 'medium']; break;
    case 'medium-only': sizes = ['medium']; break;
    default: sizes = ['tiny', 'small', 'medium', 'large', 'xlarge'];
  }

  const modes = ['range', 'full'];
  const queries = Object.entries(PRESETS);
  benchmarkResults = [];

  output.textContent = 'Starting benchmark...\n';

  for (const format of formats) {
    for (const size of sizes) {
      for (const mode of modes) {
        output.textContent += `\n--- ${format} / ${size} / ${mode} ---\n`;

        // Open database
        document.getElementById('format-select').value = format;
        document.getElementById('size-select').value = size;
        document.getElementById('mode-select').value = mode;

        try {
          await openDatabase();
          output.textContent += `  Opened in ${dbStats.openTimeMs}ms (${dbStats.requests} reqs, ${(dbStats.bytesTransferred/1024).toFixed(0)} KB)\n`;

          const openResult = { ...dbStats };

          for (const [queryName, sql] of queries) {
            try {
              const t0 = performance.now();
              const results = db.exec(sql);
              const queryTimeMs = performance.now() - t0;
              const rowCount = results.length > 0 ? results[0].values.length : 0;

              const result = {
                format, size, mode, queryName, sql,
                queryTimeMs: parseFloat(queryTimeMs.toFixed(3)),
                rowCount,
                openTimeMs: openResult.openTimeMs,
                fetchTimeMs: openResult.fetchTimeMs,
                parseTimeMs: openResult.parseTimeMs,
                requests: openResult.requests,
                bytesTransferred: openResult.bytesTransferred,
              };
              benchmarkResults.push(result);

              output.textContent += `  ${queryName}: ${queryTimeMs.toFixed(2)}ms (${rowCount} rows)\n`;
            } catch (e) {
              output.textContent += `  ${queryName}: ERROR - ${e.message}\n`;
              benchmarkResults.push({
                format, size, mode, queryName, sql,
                error: e.message,
                openTimeMs: openResult.openTimeMs,
              });
            }
          }

          if (db) { db.close(); db = null; }
        } catch (e) {
          output.textContent += `  OPEN ERROR: ${e.message}\n`;
        }
      }
    }
  }

  output.textContent += '\n=== Benchmark complete ===\n';
  output.textContent += `Total results: ${benchmarkResults.length}\n`;

  // Expose for rodney
  window.benchmarkResults = benchmarkResults;
  window.benchmarkComplete = true;
}

function exportBenchmark() {
  if (!benchmarkResults.length) { alert('Run benchmark first'); return; }
  const blob = new Blob([JSON.stringify(benchmarkResults, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'benchmark-results.json'; a.click();
  URL.revokeObjectURL(url);
}

// Expose for automation
window.openDatabase = openDatabase;
window.runQuery = runQuery;
window.runBenchmark = runBenchmark;
window.benchmarkComplete = false;
</script>
</body>
