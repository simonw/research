name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - "*/README.md"
      - "*/_summary.md"
  workflow_dispatch:

permissions:
  contents: write
  models: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install uv

      - name: Update README with cogapp
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: uv run --with-requirements requirements.txt cog -r -P README.md

      - name: Commit README updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git add */README.md 2>/dev/null || true
          git add */_summary.md 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No README updates to commit"
          else
            git commit -m "Auto-update README with cogapp"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build site
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: bash ./build-github-pages.sh

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
