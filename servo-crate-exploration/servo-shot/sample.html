<!doctype html>
<meta charset="utf-8">
<title>servo-shot sample</title>
<style>
  body { margin: 0; font: 16px/1.4 system-ui, sans-serif; color: #eee;
         background: linear-gradient(135deg, #1e1e2e, #302b63, #0f3460); }
  main { max-width: 48rem; margin: 4rem auto; padding: 2rem;
         background: rgba(255,255,255,0.06); border-radius: 1rem;
         backdrop-filter: blur(10px); }
  h1 { margin-top: 0; font-size: 2.4rem; }
  code { background: rgba(255,255,255,0.12); padding: 0.15em 0.4em;
         border-radius: 0.3em; }
</style>
<main>
  <h1>Hello from Servo 0.1.0</h1>
  <p>This page was rendered with the new <code>servo</code> crate
     via <code>SoftwareRenderingContext</code>, captured with
     <code>read_to_image()</code>, and written to disk as a PNG by
     <code>servo-shot</code>.</p>
  <p>It's a bit of a party trick, but it's also a real browser engine.</p>
</main>
