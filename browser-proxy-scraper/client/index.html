<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browser Proxy Scraper</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: #0f0f0f;
        color: #e0e0e0;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      header {
        padding: 12px 16px;
        background: #1a1a1a;
        border-bottom: 1px solid #333;
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      #url-input {
        flex: 1;
        min-width: 200px;
        padding: 8px 12px;
        background: #2a2a2a;
        border: 1px solid #444;
        border-radius: 6px;
        color: #fff;
        font-size: 14px;
        outline: none;
      }
      #url-input:focus { border-color: #666; }
      #url-input:disabled { opacity: 0.5; }
      .btn {
        padding: 8px 16px;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        white-space: nowrap;
      }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .btn-primary { background: #3b82f6; }
      .btn-primary:hover:not(:disabled) { background: #2563eb; }
      .btn-green { background: #22c55e; }
      .btn-green:hover:not(:disabled) { background: #16a34a; }
      .btn-red { background: #ef4444; }
      .btn-red:hover:not(:disabled) { background: #dc2626; }
      .btn-outline {
        background: transparent;
        border: 1px solid #444;
        color: #ccc;
      }
      .btn-outline:hover:not(:disabled) { border-color: #666; color: #fff; }
      select {
        padding: 8px 12px;
        background: #2a2a2a;
        border: 1px solid #444;
        border-radius: 6px;
        color: #fff;
        font-size: 13px;
        outline: none;
      }
      .toolbar {
        padding: 4px 16px 4px;
        background: #1a1a1a;
        display: flex;
        gap: 8px;
        align-items: center;
        font-size: 12px;
      }
      .toolbar label {
        display: flex;
        align-items: center;
        gap: 4px;
        color: #888;
        cursor: pointer;
      }
      .toolbar label:hover { color: #ccc; }
      #status {
        padding: 4px 12px;
        font-size: 12px;
        color: #888;
      }
      #status.ready { color: #22c55e; }
      #status.error { color: #ef4444; }
      .main-area {
        flex: 1;
        display: flex;
        overflow: hidden;
      }
      #proxy-frame {
        flex: 1;
        border: none;
        background: #fff;
      }
      #data-panel {
        width: 400px;
        background: #1a1a1a;
        border-left: 1px solid #333;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
      }
      #data-panel h3 {
        padding: 8px 12px;
        font-size: 13px;
        border-bottom: 1px solid #333;
        position: sticky;
        top: 0;
        background: #1a1a1a;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .data-entry {
        padding: 8px 12px;
        border-bottom: 1px solid #222;
        font-size: 12px;
        font-family: monospace;
      }
      .data-entry .url {
        color: #60a5fa;
        word-break: break-all;
        margin-bottom: 4px;
      }
      .data-entry .time { color: #666; font-size: 11px; }
      .data-entry pre {
        margin-top: 4px;
        max-height: 200px;
        overflow: auto;
        background: #0f0f0f;
        padding: 6px;
        border-radius: 4px;
        white-space: pre-wrap;
        word-break: break-all;
        font-size: 11px;
      }
      .data-entry .data-key {
        color: #fbbf24;
        font-weight: bold;
        margin-bottom: 4px;
      }
      #puppet-panel {
        padding: 8px 12px;
        border-top: 1px solid #333;
        background: #1a1a1a;
      }
      #puppet-input {
        width: 100%;
        padding: 6px 8px;
        background: #2a2a2a;
        border: 1px solid #444;
        border-radius: 4px;
        color: #fff;
        font-family: monospace;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <header>
      <input
        type="text"
        id="url-input"
        placeholder="Enter URL (e.g., https://example.com)"
        disabled
      />
      <button id="go-btn" class="btn btn-primary" disabled>Go</button>
      <select id="connector-select" disabled>
        <option value="">-- Connector --</option>
        <option value="/connectors/codepen.js">CodePen</option>
        <option value="/connectors/httpbin.js">httpbin.org</option>
        <option value="/connectors/turnstile-demo.js">Turnstile Demo</option>
        <option value="/connectors/recaptcha-demo.js">reCAPTCHA Demo</option>
        <option value="/connectors/hcaptcha-demo.js">hCaptcha Demo</option>
        <option value="/connectors/instagram-login.js">Instagram Login</option>
        <option value="/connectors/google-login.js">Google Login</option>
        <option value="/connectors/creepjs.js">CreepJS Fingerprint</option>
      </select>
      <button id="run-btn" class="btn btn-green" disabled>Run</button>
    </header>
    <div class="toolbar">
      <label>
        <input type="checkbox" id="intercept-all-json" />
        Intercept all JSON
      </label>
    </div>
    <div id="status">Initializing...</div>
    <div class="main-area">
      <iframe id="proxy-frame"></iframe>
      <div id="data-panel">
        <h3>
          Intercepted Data <span id="data-count">(0)</span>
          <button id="clear-data-btn" class="btn btn-outline" style="padding: 2px 8px; font-size: 11px;">Clear</button>
        </h3>
        <div id="data-entries"></div>
      </div>
    </div>
    <div id="puppet-panel">
      <input
        type="text"
        id="puppet-input"
        placeholder="Puppet command: query h1 | click .btn | type #input Hello"
        disabled
      />
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
